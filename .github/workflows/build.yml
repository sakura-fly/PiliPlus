name: Build

on:
  push:
    branches:
      - release
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android"
        required: false
        default: true
        type: boolean

      build_ios:
        description: "Build iOS"
        required: false
        default: true
        type: boolean

      build_mac:
        description: "Build Mac"
        required: false
        default: true
        type: boolean

      build_win_x64:
        description: "Build Win-x64"
        required: false
        default: true
        type: boolean

      build_linux_x64:
        description: "Build Linux-x64"
        required: false
        default: true
        type: boolean

      tag:
        description: "tag"
        required: false
        default: ""
        type: string

jobs:
  auto_tag:
    if: ${{ github.event_name == 'push' }}
    name: auto tag
    runs-on: ubuntu-latest
    permissions: write-all
    outputs:
      auto_tag: ${{ steps.auto_tag.outputs.auto_tag }}
    steps:

      - name: 代码迁出
        uses: actions/checkout@v6
        with:
          fetch-depth: 0



      - name: Set and Extract version
        shell: pwsh
        run: lib/scripts/build.ps1 Linux

      - name: Generate auto tag
        id: auto_tag
        run: |
          echo "auto_tag=v${{ env.version }}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: generate_notes
        run: |
               # Get PiliPlus latest commit date
               PILIPLUS_COMMIT_DATE=$(curl -s https://api.github.com/repos/bggRGjQaUbCoE/PiliPlus/commits/main | python3 -c "import sys, json; data=json.load(sys.stdin); print(data['commit']['committer']['date'])")
               echo "PiliPlus latest commit date: $PILIPLUS_COMMIT_DATE"
               
               # Part 1: Current repository commits after PiliPlus latest commit (excluding merge commits)
               COMMITS=$(git log --no-merges --pretty=format:"- %s (%h)" --since="$PILIPLUS_COMMIT_DATE" HEAD 2>/dev/null || echo "")
               
               # Part 2: Check PiliPlus for new releases and filter body
               LATEST_RELEASE=$(curl -s https://api.github.com/repos/bggRGjQaUbCoE/PiliPlus/releases/latest)
               RELEASE_TAG=$(echo "$LATEST_RELEASE" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
               RELEASE_BODY_RAW=$(echo "$LATEST_RELEASE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('body', ''))" 2>/dev/null || echo "")
               RELEASE_NAME=$(echo "$LATEST_RELEASE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('name', '').split('\n')[0])" 2>/dev/null || echo "")
               echo "LATEST_RELEASE"
               echo "$LATEST_RELEASE"
               echo "1111"
               # Filter out Assets and Contributors sections
               if [ -n "$RELEASE_BODY_RAW" ]; then
               RELEASE_BODY=$(echo "$RELEASE_BODY_RAW" | sed '/^### Contributors$/,$d' | sed '/^Assets/d' | sed '/^Loading$/d' | sed '/^### Uh oh!$/,$d' | sed '/^All reactions$/,$d')
               else
               RELEASE_BODY=""
               fi
               
               RELEASE_FILE="${{ github.workspace }}/.piliplus_last_release"
               if [ -f "$RELEASE_FILE" ]; then
               LAST_RELEASE=$(cat "$RELEASE_FILE")
               else
               LAST_RELEASE=""
               fi
               
               # Generate release notes with proper formatting
               {
               if [ -n "$COMMITS" ]; then
                echo "## What's Changed"
                echo ""
                echo "$COMMITS"
                echo ""
               fi
               
               if [ "$RELEASE_TAG" != "$LAST_RELEASE" ] && [ -n "$RELEASE_TAG" ] && [ -n "$RELEASE_BODY" ]; then
                echo "## PiliPlus New Release: $RELEASE_NAME"
                echo ""
                echo "$RELEASE_BODY"
                echo ""
          #              echo "$RELEASE_TAG" > "$RELEASE_FILE"
               fi
          
          # If no updates, add default message
               if [ -z "$COMMITS" ] && ([ "$RELEASE_TAG" = "$LAST_RELEASE" ] || [ -z "$RELEASE_TAG" ] || [ -z "$RELEASE_BODY" ]); then
               echo "Initial release"
               fi
               } > release_notes.md
               
               cat release_notes.md
  
  
  

  android:
    needs: auto_tag
    if: ${{ (github.event_name == 'push' && github.repository == 'sakura-fly/PiliPlus') || github.event.inputs.build_android == 'true' }}
    name: Release Android
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: 代码迁出
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 构建Java环境
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties

      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        id: flutter-action
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Apply Patch
        shell: pwsh
        run: lib/scripts/patch.ps1 android
        continue-on-error: true

      - name: Set and Extract version
        shell: pwsh
        run: lib/scripts/build.ps1 android

      - name: Write key
        run: |
          if [ ! -z "${{ secrets.SIGN_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.SIGN_KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks
            echo storeFile='key.jks' >> android/key.properties
            echo storePassword='${{ secrets.KEYSTORE_PASSWORD }}' >> android/key.properties
            echo keyAlias='${{ secrets.KEY_ALIAS }}' >> android/key.properties
            echo keyPassword='${{ secrets.KEY_PASSWORD }}' >> android/key.properties
          fi



      - name: Flutter Build Release Apk
        if: ${{ github.event_name == 'push' }}
        run: flutter build apk --release --split-per-abi --dart-define-from-file=pili_release.json --pub
      #
      #      - name: Flutter Build Dev Apk
      #        if: ${{ github.event_name == 'push' }}
      #        run: |
      #          flutter build apk --release --split-per-abi --android-project-arg dev=1 --pub

      - name: Rename
        run: |
          for file in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
            mv "$file" "PiliPlus_android_${{ env.version }}_${abi}.apk"
          done
        shell: bash

      - name: Release
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || needs.auto_tag.outputs.auto_tag }}
          name: ${{ github.event.inputs.tag || needs.auto_tag.outputs.auto_tag }}
          body_path: release_notes.md
          files: PiliPlus_android_*.apk
          target_commitish: ${{ github.sha }}

      - name: 上传
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Android_arm64-v8a
          path: PiliPlus_android_*_arm64-v8a.apk

      - name: 上传
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Android_armeabi-v7a
          path: PiliPlus_android_*_armeabi-v7a.apk

      - name: 上传
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Android_x86_64
          path: PiliPlus_android_*_x86_64.apk

  ios:
    needs: auto_tag
    if: ${{ (github.event_name == 'push' && github.repository == 'sakura-fly/PiliPlus') || github.event.inputs.build_ios == 'true' }}
    uses: ./.github/workflows/ios.yml
    permissions: write-all
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' || needs.auto_tag.outputs.auto_tag}}

  mac:
    needs: auto_tag
    if: ${{ (github.event_name == 'push' && github.repository == 'sakura-fly/PiliPlus') || github.event.inputs.build_mac == 'true' }}
    uses: ./.github/workflows/mac.yml
    permissions: write-all
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' || needs.auto_tag.outputs.auto_tag}}

  win_x64:
    needs: auto_tag
    if: ${{ (github.event_name == 'push' && github.repository == 'sakura-fly/PiliPlus') || github.event.inputs.build_win_x64 == 'true' }}
    uses: ./.github/workflows/win_x64.yml
    permissions: write-all
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' || needs.auto_tag.outputs.auto_tag}}

  linux_x64:
    needs: auto_tag
    if: ${{ (github.event_name == 'push' && github.repository == 'sakura-fly/PiliPlus') || github.event.inputs.build_linux_x64 == 'true' }}
    uses: ./.github/workflows/linux_x64.yml
    permissions: write-all
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' || needs.auto_tag.outputs.auto_tag}}
