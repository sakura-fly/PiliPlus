name: Build

on:
  push:
    branches:
      - release
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android"
        required: false
        default: true
        type: boolean

      build_ios:
        description: "Build iOS"
        required: false
        default: true
        type: boolean

      build_mac:
        description: "Build Mac"
        required: false
        default: true
        type: boolean

      build_win_x64:
        description: "Build Win-x64"
        required: false
        default: true
        type: boolean

      build_linux_x64:
        description: "Build Linux-x64"
        required: false
        default: true
        type: boolean

      tag:
        description: "tag"
        required: false
        default: ""
        type: string

jobs:
  fetch_release_notes:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_android == 'true' || github.event.inputs.build_ios == 'true' || github.event.inputs.build_mac == 'true' || github.event.inputs.build_win_x64 == 'true' || github.event.inputs.build_linux_x64 == 'true')) }}
    name: Fetch Release Notes
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.fetch_notes.outputs.release_body }}
    steps:
      - name: Fetch latest release from target repository
        id: fetch_notes
        run: |
          RELEASE_INFO=$(curl -s https://api.github.com/repos/bggRGjQaUbCoE/PiliPlus/releases/latest)
          RELEASE_BODY=$(echo "$RELEASE_INFO" | jq -r '.body // "No release notes available"')
          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  auto_tag:
    if: ${{ github.event_name == 'push' }}
    needs: fetch_release_notes
    name: auto tag
    runs-on: ubuntu-latest
    permissions: write-all
    outputs:
      auto_tag: ${{ steps.auto_tag.outputs.auto_tag }}
    steps:

      - name: 代码迁出
        uses: actions/checkout@v6
        with:
          fetch-depth: 0



      - name: Set and Extract version
        shell: pwsh
        run: lib/scripts/build.ps1 Linux

      - name: Generate auto tag
        id: auto_tag
        run: |
          echo "auto_tag=v${{ env.version }}" >> $GITHUB_OUTPUT
          




  android:
    needs: [auto_tag, fetch_release_notes]
    if: ${{ (github.event_name == 'push' && github.repository == 'sakura-fly/PiliPlus') || github.event.inputs.build_android == 'true' }}
    name: Release Android
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: 代码迁出
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 构建Java环境
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties

      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        id: flutter-action
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Apply Patch
        shell: pwsh
        run: lib/scripts/patch.ps1 android
        continue-on-error: true

      - name: Set and Extract version
        shell: pwsh
        run: lib/scripts/build.ps1 android

      - name: Write key
        run: |
          if [ ! -z "${{ secrets.SIGN_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.SIGN_KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks
            echo storeFile='key.jks' >> android/key.properties
            echo storePassword='${{ secrets.KEYSTORE_PASSWORD }}' >> android/key.properties
            echo keyAlias='${{ secrets.KEY_ALIAS }}' >> android/key.properties
            echo keyPassword='${{ secrets.KEY_PASSWORD }}' >> android/key.properties
          fi



      - name: Flutter Build Release Apk
        if: ${{ github.event_name == 'push' }}
        run: flutter build apk --release --split-per-abi --dart-define-from-file=pili_release.json --pub
#
#      - name: Flutter Build Dev Apk
#        if: ${{ github.event_name == 'push' }}
#        run: |
#          flutter build apk --release --split-per-abi --android-project-arg dev=1 --pub

      - name: Rename
        run: |
          for file in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
            mv "$file" "PiliPlus_android_${{ env.version }}_${abi}.apk"
          done
        shell: bash

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Android_arm64-v8a
          path: PiliPlus_android_*_arm64-v8a.apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Android_armeabi-v7a
          path: PiliPlus_android_*_armeabi-v7a.apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Android_x86_64
          path: PiliPlus_android_*_x86_64.apk

  ios:
    needs: [auto_tag, fetch_release_notes]
    if: ${{ (github.event_name == 'push' && github.repository == 'sakura-fly/PiliPlus') || github.event.inputs.build_ios == 'true' }}
    uses: ./.github/workflows/ios.yml
    permissions: write-all
    with:
      tag: ${{ github.event.inputs.tag || (github.event_name == 'push' && needs.auto_tag.outputs.auto_tag) || '' }}

  mac:
    needs: [auto_tag, fetch_release_notes]
    if: ${{ (github.event_name == 'push' && github.repository == 'sakura-fly/PiliPlus') || github.event.inputs.build_mac == 'true' }}
    uses: ./.github/workflows/mac.yml
    permissions: write-all
    with:
      tag: ${{ github.event.inputs.tag || (github.event_name == 'push' && needs.auto_tag.outputs.auto_tag) || '' }}

  win_x64:
    needs: [auto_tag, fetch_release_notes]
    if: ${{ (github.event_name == 'push' && github.repository == 'sakura-fly/PiliPlus') || github.event.inputs.build_win_x64 == 'true' }}
    uses: ./.github/workflows/win_x64.yml
    permissions: write-all
    with:
      tag: ${{ github.event.inputs.tag || (github.event_name == 'push' && needs.auto_tag.outputs.auto_tag) || '' }}

  linux_x64:
    needs: [auto_tag, fetch_release_notes]
    if: ${{ (github.event_name == 'push' && github.repository == 'sakura-fly/PiliPlus') || github.event.inputs.build_linux_x64 == 'true' }}
    uses: ./.github/workflows/linux_x64.yml
    permissions: write-all
    with:
      tag: ${{ github.event.inputs.tag || (github.event_name == 'push' && needs.auto_tag.outputs.auto_tag) || '' }}

  create_release:
    needs: [android, ios, mac, win_x64, linux_x64, fetch_release_notes]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'push') }}
    name: Create Unified Release
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release_files
          find artifacts -type f -exec cp {} release_files/ \;
          ls -la release_files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || needs.auto_tag.outputs.auto_tag }}
          name: ${{ github.event.inputs.tag || needs.auto_tag.outputs.auto_tag }}
          body: ${{ needs.fetch_release_notes.outputs.release_body }}
          files: release_files/*
          target_commitish: ${{ github.sha }}
          generate_release_notes: false
